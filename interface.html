<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu de voitures</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #000000;
      color: #eee;
    }

    h2 { color: #5498f2; }

    /* --- SECTION PING --- */
    #section-ping {
      border: 2px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
    }

    /* --- SECTION PSEUDO --- */
    #section-pseudo {
      border: 2px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
    }

    input {
      padding: 6px;
      border: 1px solid #000000;
      background: #d1dae6;
      color: white;
    }

    button {
      padding: 6px 12px;
      margin-left: 5px;
      background: #6d7a93;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover { background: #c73652; }

    /* --- LISTE DES JOUEURS --- */
    #liste-joueurs {
      border: 1px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      min-height: 40px;
    }

    /* --- INSTRUCTIONS --- */
    #section-instructions {
      margin-bottom: 20px;
    }

    #instructions-choisies {
      display: inline-block;
      margin-left: 10px;
      font-size: 20px;
      letter-spacing: 4px;
    }
    
    /* --- CIRCUIT --- */
    #circuit {
      position: relative;
      width: 500px;
      height: 500px;
      background: #ffffff;
      border: 2px solid #000000;
      margin-top: 20px;
    }

    /* Chaque voiture est un petit carré coloré avec une flèche */
    .voiture {
      position: absolute;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 4px;
      border: 2px solid white;
      transition: all 0.3s ease;
    }

    /* Label du pseudo sous la voiture */
    .voiture-label {
      position: absolute;
      top: 42px;
      font-size: 10px;
      white-space: nowrap;
      color: white;
      text-align: center;
      width: 100%;
    }

    /* Couleurs pour chaque voiture (par index) */
    .couleur-0 { background: #e94560; }
    .couleur-1 { background: #0f9b58; }
    .couleur-2 { background: #1d6fa5; }
    .couleur-3 { background: #d4a017; }
  </style>
</head>
<body>

  <h1>need for speed</h1>

  <!-- ===================== SECTION 1 : PING ===================== -->
  <div id="section-ping">
    <h2>test de connexion</h2>
    <button onclick="ping()">ping</button>
    <p id="reponse-ping"></p>
  </div>

  <br>

  <!-- ===================== SECTION 2 : PSEUDO ===================== -->
  <div id="section-pseudo">
    <h2>entrer son pseudo</h2>
    <input id="input-pseudo" type="text" placeholder="Ton pseudo">
    <button onclick="envoyerPseudo()">enter</button>
    <p id="reponse-pseudo"></p>
  </div>

  <!-- ===================== LISTE DES JOUEURS ===================== -->
  <h2>joueurs connectés</h2>
  <div id="liste-joueurs">en attente de joueurs</div>

  <!-- ===================== INSTRUCTIONS ===================== -->
  <div id="section-instructions">
    <h2>tes 4 instructions</h2>
    <p>choisis 4 actions dans l'ordre:</p>
    <button onclick="ajouterInstruction('A')">A: avancer</button>
    <button onclick="ajouterInstruction('B')">B: tourner à gauche</button>
    <button onclick="ajouterInstruction('C')">C: tourner à droite</button>
    <button onclick="reinitialiserInstructions()">effacer</button>
    <br><br>
    <span>instructions choisies : </span>
    <span id="instructions-choisies">—</span>
    <br><br>
    <button onclick="envoyerInstructions()">envoyer mes instructions</button>
    <p id="reponse-instructions"></p>
  </div>

  <!-- ===================== CIRCUIT ===================== -->
  <h2>circuit</h2>
  <div id="circuit">
    <!-- Les voitures seront ajoutées ici dynamiquement -->
  </div>


  <!-- ===================== JAVASCRIPT ===================== -->
  <script>

    // -------------------------------------------------------
    // VARIABLES GLOBALES
    // -------------------------------------------------------
    let monPseudo = null;         // Le pseudo de CE joueur
    let socket = null;            // La connexion WebSocket
    let instructions = [];        // Les 4 instructions choisies

    // On récupère automatiquement l'adresse de la machine qui héberge le jeu.
    // Comme ça, que tu sois en local (localhost) ou sur le réseau (192.168.x.x),
    // les autres joueurs n'ont rien à changer.
    const HOST = window.location.hostname;  // ex: "localhost" ou "192.168.1.42"
    const API_URL = `http://${HOST}:8000`;  // ex: "http://192.168.1.42:8000"
    const WS_URL  = `ws://${HOST}:8000`;    // ex: "ws://192.168.1.42:8000"


    // -------------------------------------------------------
    // FONCTION : PING
    // Envoie GET /ping à l'API, affiche la réponse
    // -------------------------------------------------------
    function ping() {
      fetch(`${API_URL}/ping`)
        .then(reponse => reponse.json())
        .then(data => {
          document.getElementById('reponse-ping').textContent = data.message;
        })
        .catch(() => {
          document.getElementById('reponse-ping').textContent = 'L\'API ne répond pas';
        });
    }


    // -------------------------------------------------------
    // FONCTION : ENVOYER PSEUDO
    // 1. POST /pseudo pour enregistrer le joueur dans l'API
    // 2. Ouvre la connexion WebSocket /ws
    // 3. S'identifie via le WebSocket
    // -------------------------------------------------------
    function envoyerPseudo() {
      const input = document.getElementById('input-pseudo');
      const pseudo = input.value.trim();

      if (!pseudo) {
        alert('Entre un pseudo !');
        return;
      }

      monPseudo = pseudo;

      // ETAPE 1 : Envoyer le pseudo à l'API via HTTP POST
      fetch(`${API_URL}/pseudo`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pseudo: pseudo })
      })
      .then(reponse => reponse.json())
      .then(data => {
        document.getElementById('reponse-pseudo').textContent = data.message;

        // ETAPE 2 : Ouvrir la connexion WebSocket
        ouvrirWebSocket();
      })
      .catch(() => {
        document.getElementById('reponse-pseudo').textContent = 'erreur lors de l\'envoi';
      });
    }


    // -------------------------------------------------------
    // FONCTION : OUVRIR LE WEBSOCKET
    // Se connecte à ws://localhost:8000/ws
    // Et écoute les messages de l'API
    // -------------------------------------------------------
    function ouvrirWebSocket() {
      socket = new WebSocket(`${WS_URL}/ws`);

      // Quand le WS est bien ouvert, on s'identifie
      socket.addEventListener('open', () => {
        console.log('WebSocket ouvert !');
        // On envoie notre pseudo pour que l'API sache qui on est
        socket.send(JSON.stringify({
          type: 'identification',
          pseudo: monPseudo
        }));
      });

      // Quand on reçoit un message de l'API
      socket.addEventListener('message', (evenement) => {
        const message = JSON.parse(evenement.data);

        // L'API nous envoie la liste des utilisateurs
        if (message.type === 'liste_utilisateurs') {
          afficherListeJoueurs(message.data);
          afficherVoitures(message.data);
        }
      });

      socket.addEventListener('close', () => {
        console.log('WebSocket fermé');
      });
    }


    // -------------------------------------------------------
    // FONCTION : AFFICHER LA LISTE DES JOUEURS (texte)
    // -------------------------------------------------------
    function afficherListeJoueurs(listeJoueurs) {
      const div = document.getElementById('liste-joueurs');
      if (listeJoueurs.length === 0) {
        div.textContent = 'Aucun joueur connecté';
        return;
      }
      div.innerHTML = listeJoueurs.map(joueur =>
        `<div>🎮 <strong>${joueur.pseudo}</strong> — position (${joueur.position.x}, ${joueur.position.y}) — direction : ${joueur.direction}</div>`
      ).join('');
    }


    // -------------------------------------------------------
    // FONCTION : AFFICHER LES VOITURES DANS LE CIRCUIT
    // -------------------------------------------------------

    // Convertit une direction en emoji flèche
    function directionEnFleche(direction) {
      const fleches = {
        haut: '⬆️',
        bas: '⬇️',
        gauche: '⬅️',
        droite: '➡️'
      };
      return fleches[direction] || '?';
    }

    function afficherVoitures(listeJoueurs) {
      const circuit = document.getElementById('circuit');
      circuit.innerHTML = ''; // On efface et on redessine

      // Taille d'une case dans le circuit (circuit = 500px, grille 10x10)
      const tailleCase = 50;

      listeJoueurs.forEach((joueur, index) => {
        // Créer la div voiture
        const voiture = document.createElement('div');
        voiture.classList.add('voiture', `couleur-${index % 4}`);
        voiture.textContent = directionEnFleche(joueur.direction);

        // Ajouter le label avec le pseudo
        const label = document.createElement('span');
        label.classList.add('voiture-label');
        label.textContent = joueur.pseudo;
        voiture.appendChild(label);

        // Positionner la voiture selon x,y
        // On limite pour que la voiture reste dans le circuit
        const x = (joueur.position.x % 10) * tailleCase;
        const y = (joueur.position.y % 10) * tailleCase;
        voiture.style.left = Math.abs(x) + 'px';
        voiture.style.top = Math.abs(y) + 'px';

        circuit.appendChild(voiture);
      });
    }


    // -------------------------------------------------------
    // FONCTIONS : GESTION DES INSTRUCTIONS
    // -------------------------------------------------------

    function ajouterInstruction(lettre) {
      if (instructions.length >= 4) {
        alert('Tu as déjà 4 instructions ! Envoie-les ou efface-les.');
        return;
      }
      instructions.push(lettre);
      document.getElementById('instructions-choisies').textContent = instructions.join(' ');
    }

    function reinitialiserInstructions() {
      instructions = [];
      document.getElementById('instructions-choisies').textContent = '—';
    }

    function envoyerInstructions() {
      if (!socket) {
        alert('Tu dois d\'abord entrer ton pseudo et te connecter !');
        return;
      }
      if (instructions.length !== 4) {
        alert('Tu dois choisir exactement 4 instructions !');
        return;
      }

      // On envoie les instructions via le WebSocket
      socket.send(JSON.stringify({
        type: 'instructions',
        pseudo: monPseudo,
        instructions: instructions
      }));

      document.getElementById('reponse-instructions').textContent = 'instructions envoyées, en attente des autres joueurs...';
      reinitialiserInstructions(); // On remet à zéro l'affichage
    }

  </script>
</body>
</html>
