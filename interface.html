<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu de voitures</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #000000;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;}
    
    h2 { color: #5498f2; }

    /* --- SECTION PING --- */
    #section-ping {
      border: 2px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
      text-align: center;
    }

    /* --- SECTION PSEUDO --- */
    #section-pseudo {
      border: 2px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
      text-align: center;
    }

    input {
      padding: 6px;
      border: 1px solid #000000;
      background: #434d5a;
      color: white;
    }

    button {
      padding: 6px 12px;
      margin-left: 5px;
      background: #6d7a93;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover { background: #434d5a; }

    /* --- LISTE DES JOUEURS --- */
    #liste-joueurs {
      border: 1px solid #000000;
      padding: 10px;
      margin-bottom: 20px;
      min-height: 40px;
    }

    /* --- INSTRUCTIONS --- */
    #section-instructions {
      margin-bottom: 20px;
      text-align: center;
    }

    #instructions-choisies {
      display: inline-block;
      margin-left: 10px;
      font-size: 20px;
      letter-spacing: 4px;
      text-align: center;
    }
    
    /* --- CIRCUIT --- */
    #circuit {
      position: relative;
      width: 500px;
      height: 500px;
      background: #ffffff;
      border: 2px solid #000000;
      margin-top: 20px;
      text-align: center;
    }

    /* Chaque voiture est un petit carré coloré avec une flèche */
    .voiture {
      position: absolute;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 4px;
      border: 2px solid white;
      transition: all 0.3s ease;
    }

    /* Label du pseudo sous la voiture */
    .voiture-label {
      position: absolute;
      top: 42px;
      font-size: 10px;
      white-space: nowrap;
      color: white;
      text-align: center;
      width: 100%;
    }

    /* Couleurs pour chaque voiture (par index) */
    .couleur-0 { background: #e94560; }
    .couleur-1 { background: #0f9b58; }
    .couleur-2 { background: #1d6fa5; }
    .couleur-3 { background: #d4a017; }
  </style>
</head>
<body>

  <h1>need for speed</h1>

  <!-- ===================== SECTION 1 : PING ===================== -->
  <div id="section-ping">
    <h2>test de connexion</h2>
    <button onclick="ping()">ping</button>
    <p id="reponse-ping"></p>
  </div>

  <br>

  <!-- ===================== SECTION 2 : PSEUDO ===================== -->
  <div id="section-pseudo">
    <h2>entrer son pseudo</h2>
    <input id="input-pseudo" type="text" placeholder="st.text_input">
    <button onclick="envoyerPseudo()">enter</button>
    <p id="reponse-pseudo"></p>
  </div>

  <!-- ===================== LISTE DES JOUEURS ===================== -->
  <h2>joueurs connectés</h2>
  <div id="liste-joueurs">en attente de joueurs</div>

  <!-- ===================== INSTRUCTIONS ===================== -->
  <div id="section-instructions">
    <h2>les instructions</h2>
    <p>choisis 4 actions dans l'ordre:</p>
    <button onclick="ajouterInstruction('A')">A: avancer</button>
    <button onclick="ajouterInstruction('B')">B: tourner à gauche</button>
    <button onclick="ajouterInstruction('C')">C: tourner à droite</button>
    <button onclick="reinitialiserInstructions()">effacer</button>
    <br><br>
    <span>instructions choisies : </span>
    <span id="instructions-choisies">—</span>
    <br><br>
    <button onclick="envoyerInstructions()">envoyer mes instructions</button>
    <p id="reponse-instructions"></p>
  </div>

  <!-- ===================== CIRCUIT ===================== -->
  <h2>circuit</h2>
  <div id="circuit">
    <!-- Les voitures seront ajoutées ici dynamiquement -->
  </div>

</html>
